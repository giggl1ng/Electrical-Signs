<!DOCTYPE html>
<html lang="en">
<h1 style="
  text-align: center;
  font-size: 3rem;
  font-weight: 900;
  margin-bottom: 20px;
  color: #2c3e50;
  text-transform: uppercase;
  letter-spacing: 2px;
">
  🗳️ Vote Alex Li for Electrical Rep 🗳️
</h1>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Signature Form</title>
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f7fa; display: flex; justify-content: center; padding: 40px; }
    .container { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0px 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
    h1 { text-align: center; color: #333; margin-bottom: 25px; }
    label { display: block; margin-top: 15px; font-weight: bold; }
    input { width: 100%; padding: 10px; margin-top: 5px; border-radius: 6px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
    canvas { border: 2px solid #333; border-radius: 6px; margin-top: 10px; width: 100%; height: 200px; cursor: crosshair; }
    button { background: #0066ff; color: #fff; padding: 12px; width: 100%; margin-top: 20px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #0050cc; }
    .clear-btn { background: #999; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Student Signature Form</h1>
    <form id="signatureForm">
      <label>First Name</label>
      <input type="text" id="first_name" name="first_name" required />

      <label>Last Name</label>
      <input type="text" id="last_name" name="last_name" required />

      <label>Student Number</label>
      <input type="text" id="student_number" name="student_number" required />

      <!-- ✅ NEW: Student Email field -->
      <label>Student Email</label>
      <input type="email" id="student_email" name="student_email" placeholder="e.g. student@university.ca" required />

      <label>Signature</label>
      <canvas id="signature-pad"></canvas>
      <button type="button" class="clear-btn" id="clear-signature">Clear Signature</button>

      <button type="submit">Submit</button>
    </form>
  </div>

  <script>
    emailjs.init("4OVn_xCzug22ww1M6");

    const canvas = document.getElementById("signature-pad");
    const ctx = canvas.getContext("2d");
    let drawing = false;

    function resizeCanvas() { canvas.width = canvas.clientWidth; canvas.height = canvas.clientHeight; }
    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    function getPosition(e) {
      const rect = canvas.getBoundingClientRect();
      return { x: (e.touches ? e.touches[0].clientX : e.clientX) - rect.left, y: (e.touches ? e.touches[0].clientY : e.clientY) - rect.top };
    }

    canvas.addEventListener("mousedown", e => { drawing = true; const pos = getPosition(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); });
    canvas.addEventListener("mousemove", e => { if (!drawing) return; const pos = getPosition(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); });
    canvas.addEventListener("mouseup", () => (drawing = false));
    canvas.addEventListener("mouseleave", () => (drawing = false));
    canvas.addEventListener("touchstart", e => { drawing = true; const pos = getPosition(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); });
    canvas.addEventListener("touchmove", e => { if (!drawing) return; e.preventDefault(); const pos = getPosition(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); });
    canvas.addEventListener("touchend", () => (drawing = false));

    document.getElementById("clear-signature").addEventListener("click", () => ctx.clearRect(0, 0, canvas.width, canvas.height));

    async function uploadSignature() {
      const formData = new FormData();
      formData.append("file", canvas.toDataURL("image/png"));
      formData.append("upload_preset", "signature_upload");
      const res = await fetch("https://api.cloudinary.com/v1_1/djadp6jdx/image/upload", { method: "POST", body: formData });
      return (await res.json()).secure_url;
    }

    document.getElementById("signatureForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const signature_url = await uploadSignature();

      const params = {
        first_name: document.getElementById("first_name").value,
        last_name: document.getElementById("last_name").value,
        student_number: document.getElementById("student_number").value,
        student_email: document.getElementById("student_email").value,  // ✅ NEW
        signature_url: signature_url,
        time: new Date().toLocaleString()
      };

      emailjs.send("service_uvgv8ud", "template_wojtlwh", params)
        .then(() => { alert("✅ Form submitted successfully!"); document.getElementById("signatureForm").reset(); ctx.clearRect(0, 0, canvas.width, canvas.height); })
        .catch(err => { console.error(err); alert("❌ Something went wrong."); });
    });
  </script>
</body>
</html>
